name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "validation/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "validation/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # CA Judge: 실제 Anthropic API 호출 없이 rule 기반으로 동작
  HACHILLESWORLD_CA_JUDGE: rule

# ── 잡 공통 Python 버전 ─────────────────────────────────────────────────
defaults:
  run:
    shell: bash

jobs:
  # ────────────────────────────────────────────────────────────────────
  # 1. 테스트 (Python 3.11 · 3.12 매트릭스)
  # ────────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (dev + ca extras)
        # ca extra: anthropic 포함 — CA judge 백엔드 import 경로 정상 확인
        run: pip install -e ".[dev,ca]"

      - name: Smoke test — CLI sanity check
        run: |
          hachillesworld version
          python -c "from hachillesworld import HAchillesWorldClient, DiagnosticReport, Level, LawsDomain; print('imports OK')"

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=hachillesworld \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -q

      - name: Upload coverage report (3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────
  # 2. 린트 (ruff — pyproject.toml 버전 사용)
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies (ruff from pyproject.toml)
        run: pip install -e ".[dev]"

      - name: Check style
        run: ruff check src/ tests/

      - name: Check formatting
        run: ruff format --check src/ tests/

      - name: Show format diff (failure only)
        if: failure()
        run: ruff format --diff src/ tests/ || true

  # ────────────────────────────────────────────────────────────────────
  # 3. 타입 검사 (mypy strict)
  # ────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,ca]"

      - name: Run mypy
        run: mypy src/hachillesworld/

  # ────────────────────────────────────────────────────────────────────
  # 4. 보안 스캔 (pip-audit)
  # ────────────────────────────────────────────────────────────────────
  security:
    name: Security scan (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip (fix pip self-CVE before audit)
        run: pip install --upgrade pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -e ".[dev,ca]"

      - name: Audit dependencies
        run: pip-audit --skip-editable

  # ────────────────────────────────────────────────────────────────────
  # 5. CI 게이트 — 모든 잡이 통과해야 merge 가능
  # ────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck, security]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.test.result }}"     != "success" ||
                "${{ needs.lint.result }}"     != "success" ||
                "${{ needs.typecheck.result }}" != "success" ||
                "${{ needs.security.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
