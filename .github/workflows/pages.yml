name: Deploy Landing Page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────
  # 1. HTML 링크·구조 검증
  # ────────────────────────────────────────────────────────────────────
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Lint HTML files
        # 주요 HTML 파일만 검사 (node_modules 제외)
        run: |
          htmlhint \
            landing/index.html \
            landing/index-en.html \
            landing/blog.html \
            landing/blog-*.html \
            landing/optimize.html \
            landing/cert.html \
            --config .htmlhintrc || true

      - name: Check internal links
        # 블로그 카드가 참조하는 HTML 파일이 실제로 존재하는지 확인
        run: |
          echo "Checking blog post files referenced in blog.html..."
          grep -oP 'href="(blog-[^"]+\.html)"' landing/blog.html | \
            grep -oP '"[^"]+"' | tr -d '"' | sort -u | \
          while read -r f; do
            if [ ! -f "landing/$f" ]; then
              echo "MISSING: landing/$f"
              exit 1
            else
              echo "OK: landing/$f"
            fi
          done

  # ────────────────────────────────────────────────────────────────────
  # 2. GitHub Pages 배포
  # ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
