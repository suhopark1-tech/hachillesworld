  pa:   { ok: 0.85, warn: 0.75, crit: 0.65 }
  odr:  { ok: 0.70, warn: 0.60, crit: 0.50 }
  wmul: { ok: 72,   warn: 168,  crit: 336  }  # hours — 연구 주기 반영
  pd:   { l3: 22,   l2: 15,     l1: 5      }
  scr:  { l3: 0.20, l2: 0.15,   l1: 0.08  }
  ca:   { l3: 0.80, l2: 0.75               }  # 반사실 정확도 중요 (가설 검증)
  gar:  { l3: 0.85, l2: 0.78,   l1: 0.70  }
  as_:  { l3: 0.95, l2: 0.92,   l1: 0.85  }
  lcr:  { ok: 1.25, warn: 1.67, crit: 2.50 }  # 재보정 허용 범위 넓음
